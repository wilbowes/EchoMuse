services:
  echomuse-controller:
    build:
      context: .
      args:
        # CUDA onnxruntime for wake-word inference on this host's GPU.
        # The published GHCR image (docker-compose.deploy.yml) is CPU-only.
        GPU: "1"
    container_name: echomuse-controller
    restart: unless-stopped
    network_mode: host
    environment:
      - DEBUG=1
    env_file:
      - .env
    volumes:
      # Persist database across container rebuilds
      - ~EchoMuse/controller/data:/app/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
