<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EchoMuse Device Management</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <style>
    @font-face { font-family: 'DM Sans'; font-weight: 400; src: url('/static/vendor/fonts/dm-sans.woff2') format('woff2'); }
    @font-face { font-family: 'DM Sans'; font-weight: 600; src: url('/static/vendor/fonts/dm-sans.woff2') format('woff2'); }
    @font-face { font-family: 'DM Mono'; font-weight: 400; src: url('/static/vendor/fonts/dm-mono-400.woff2') format('woff2'); }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #ccc8c0;
      --surface:   #d8d4cc;
      --card:      #e0dcd4;
      --border:    #b8b4ac;
      --lcd-bg:    #1e2219;
      --lcd-green: #9aba80;
      --lcd-amber: #d4703a;
      --lcd-dim:   #3a4a30;
      --text:      #1e1c18;
      --muted:     #8a8680;
    }

    html, body {
      height: 100%;
      background: linear-gradient(160deg, var(--bg) 0%, #b8b4ac 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
    }

    .frame {
      background: linear-gradient(170deg, var(--card) 0%, var(--surface) 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow:
        0 32px 80px rgba(0,0,0,0.22),
        0 2px 0 rgba(255,255,255,0.7) inset;
      padding: 48px 56px;
      text-align: center;
      max-width: 480px;
      width: 90vw;
    }

    .dot-wrap {
      width: 180px;
      height: 180px;
      margin: 0 auto 32px;
    }
    .dot-wrap svg { display: block; }

    @keyframes ledpulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1;   }
    }
    .led-ring { animation: ledpulse 1.8s ease-in-out infinite; }

    .lcd {
      background: linear-gradient(160deg, #2a2e28 0%, var(--lcd-bg) 100%);
      border: 1px solid #1a1c18;
      border-radius: 8px;
      padding: 14px 20px;
      margin-bottom: 24px;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.6);
    }
    .lcd-label {
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      color: var(--lcd-dim);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .lcd-value {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--lcd-green);
      letter-spacing: 0.08em;
      text-shadow: 0 0 10px rgba(140,200,100,0.5);
      line-height: 1.6;
    }

    .title {
      font-size: 28px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }
    .subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    form { display: none; }
    form.active { display: block; }

    .field { margin-bottom: 12px; text-align: left; }
    .field label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 5px;
      padding-left: 2px;
    }
    .field input {
      width: 100%;
      background: linear-gradient(160deg, #2a2e28 0%, var(--lcd-bg) 100%);
      border: 1px solid #1a1c18;
      border-radius: 6px;
      padding: 10px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--lcd-green);
      letter-spacing: 0.05em;
      caret-color: var(--lcd-green);
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.5);
      outline: none;
    }
    .field input:focus { border-color: #4a5a40; }

    button[type=submit] {
      width: 100%;
      margin-top: 8px;
      background: linear-gradient(170deg, #e8e4dc 0%, var(--surface) 100%);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.12), 0 1px 0 rgba(255,255,255,0.6) inset;
    }
    button[type=submit]:hover  { background: #eceae2; }
    button[type=submit]:active { box-shadow: inset 0 2px 4px rgba(0,0,0,0.15); }
    button[type=submit]:disabled { opacity: 0.5; cursor: default; }

    .hint {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-top: 20px;
      line-height: 1.6;
    }
    .hint code {
      font-family: 'DM Mono', monospace;
      color: var(--text2, #4a4844);
    }
  </style>
</head>
<body>
  <div class="frame">

    <!--
      Echo Dot Gen 2 — top-down view
      Four buttons at N/S/E/W: vol+, vol-, mute, action
      12-segment LED ring between outer shell and inner surface
    -->
    <div class="dot-wrap">
      <svg viewBox="0 0 200 200" width="180" height="180" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="em-shell" cx="38%" cy="32%" r="65%">
            <stop offset="0%"   stop-color="#505050"/>
            <stop offset="55%"  stop-color="#2c2c2c"/>
            <stop offset="100%" stop-color="#181818"/>
          </radialGradient>
          <radialGradient id="em-inner" cx="42%" cy="36%" r="58%">
            <stop offset="0%"   stop-color="#383838"/>
            <stop offset="100%" stop-color="#202020"/>
          </radialGradient>
          <radialGradient id="em-btn" cx="38%" cy="28%" r="62%">
            <stop offset="0%"   stop-color="#505050"/>
            <stop offset="100%" stop-color="#2a2a2a"/>
          </radialGradient>
          <radialGradient id="em-sheen" cx="33%" cy="27%" r="50%">
            <stop offset="0%"   stop-color="rgba(255,255,255,0.10)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
          </radialGradient>
          <filter id="em-glow" x="-80%" y="-80%" width="260%" height="260%">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <filter id="em-btn-shadow">
            <feDropShadow dx="0" dy="1" stdDeviation="1.2"
              flood-color="rgba(0,0,0,0.7)"/>
          </filter>
          <clipPath id="em-disc">
            <circle cx="100" cy="100" r="96"/>
          </clipPath>
        </defs>

        <!-- Outer shell -->
        <circle cx="100" cy="100" r="98" fill="#0d0d0d"/>
        <circle cx="100" cy="100" r="96" fill="url(#em-shell)"/>
        <circle cx="100" cy="100" r="96" fill="url(#em-sheen)"/>
        <circle cx="100" cy="100" r="96" fill="none"
          stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>

        <!-- LED ring channel + 12 segments -->
        <g clip-path="url(#em-disc)">
          <!-- Dark groove -->
          <circle cx="100" cy="100" r="83.5"
            fill="none" stroke="#0b0b0b" stroke-width="14"/>
          <!--
            12 LED segments via stroke-dasharray
            Circumference = 2π × 83.5 ≈ 524.7
            Per slot = 524.7 / 12 ≈ 43.7
            Segment = 31px  Gap = 12.7px
          -->
          <circle class="led-ring" id="led-ring" cx="100" cy="100" r="83.5"
            fill="none"
            stroke="#3a4a30"
            stroke-width="9"
            stroke-dasharray="31 12.7"
            stroke-linecap="butt"
            transform="rotate(-90 100 100)"
            filter="url(#em-glow)"
          />
          <!-- Segment dividers — thin black slots -->
          <circle cx="100" cy="100" r="83.5"
            fill="none"
            stroke="#141414"
            stroke-width="14"
            stroke-dasharray="1.5 42.2"
            stroke-linecap="butt"
            transform="rotate(-90 100 100)"
          />
        </g>

        <!-- Inner surface -->
        <circle cx="100" cy="100" r="76" fill="url(#em-inner)"/>
        <circle cx="100" cy="100" r="76" fill="none"
          stroke="rgba(255,255,255,0.04)" stroke-width="0.8"/>

        <!-- ── Buttons ── -->

        <!-- Vol+ — 12 o'clock — up chevron -->
        <g transform="translate(100,47)" filter="url(#em-btn-shadow)">
          <circle r="12.5" fill="url(#em-btn)"
            stroke="rgba(255,255,255,0.07)" stroke-width="0.8"/>
          <polyline points="-5.5,3.5 0,-3.5 5.5,3.5"
            fill="none" stroke="#b0b0b0" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round"/>
        </g>

        <!-- Vol- — 6 o'clock — down chevron -->
        <g transform="translate(100,153)" filter="url(#em-btn-shadow)">
          <circle r="12.5" fill="url(#em-btn)"
            stroke="rgba(255,255,255,0.07)" stroke-width="0.8"/>
          <polyline points="-5.5,-3.5 0,3.5 5.5,-3.5"
            fill="none" stroke="#b0b0b0" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round"/>
        </g>

        <!-- Mute — 9 o'clock — microphone -->
        <g transform="translate(47,100)" filter="url(#em-btn-shadow)">
          <circle r="12.5" fill="url(#em-btn)"
            stroke="rgba(255,255,255,0.07)" stroke-width="0.8"/>
          <!-- Capsule -->
          <rect x="-3.5" y="-7.5" width="7" height="9.5" rx="3.5"
            fill="#b0b0b0"/>
          <!-- Stand arc -->
          <path d="M-6,1.5 Q-6,8.5 0,8.5 Q6,8.5 6,1.5"
            fill="none" stroke="#b0b0b0" stroke-width="1.5"
            stroke-linecap="round"/>
          <!-- Post -->
          <line x1="0" y1="8.5" x2="0" y2="11"
            stroke="#b0b0b0" stroke-width="1.5" stroke-linecap="round"/>
          <!-- Base -->
          <line x1="-3.5" y1="11" x2="3.5" y2="11"
            stroke="#b0b0b0" stroke-width="1.5" stroke-linecap="round"/>
        </g>

        <!-- Action — 3 o'clock — filled dot -->
        <g transform="translate(153,100)" filter="url(#em-btn-shadow)">
          <circle r="12.5" fill="url(#em-btn)"
            stroke="rgba(255,255,255,0.07)" stroke-width="0.8"/>
          <circle r="5" fill="#b0b0b0"/>
        </g>

        <!-- Specular dome highlight -->
        <ellipse cx="80" cy="70" rx="32" ry="20"
          fill="rgba(255,255,255,0.045)"
          transform="rotate(-25 80 70)"/>
      </svg>
    </div>

    <div class="title">EchoMuse</div>
    <div class="subtitle">Device Management</div>

    <div class="lcd">
      <div class="lcd-label">Controller</div>
      <div class="lcd-value" id="lcd-status">
        <span style="color:#3a4a30">Connecting…</span>
      </div>
    </div>

    <!-- First-run setup — shown when no admin account exists yet.
         Amber ring, mirroring the device's own setup-mode LED state. -->
    <form id="form-setup" autocomplete="off">
      <div class="field">
        <label for="su-token">Setup token</label>
        <input id="su-token" type="text" spellcheck="false" autocomplete="off" />
      </div>
      <div class="field">
        <label for="su-user">Username</label>
        <input id="su-user" type="text" spellcheck="false" autocomplete="username" />
      </div>
      <div class="field">
        <label for="su-pass">Password</label>
        <input id="su-pass" type="password" autocomplete="new-password" />
      </div>
      <button type="submit" id="su-btn">Create admin account</button>
    </form>

    <!-- Login — shown when the controller is already configured.
         Green ring: controller ready, awaiting sign-in. -->
    <form id="form-login">
      <div class="field">
        <label for="li-user">Username</label>
        <input id="li-user" type="text" spellcheck="false" autocomplete="username" />
      </div>
      <div class="field">
        <label for="li-pass">Password</label>
        <input id="li-pass" type="password" autocomplete="current-password" />
      </div>
      <button type="submit" id="li-btn">Sign in</button>
    </form>

    <div class="hint" id="hint"></div>

  </div>

  <script>
    const lcd   = document.getElementById('lcd-status');
    const hint  = document.getElementById('hint');
    const ring  = document.getElementById('led-ring');

    const GREEN = '#9aba80';
    const AMBER = '#d4703a';
    const DIM   = '#3a4a30';
    const RED   = '#c04040';

    function setLcd(text, color) {
      lcd.innerHTML =
        `<span style="color:${color};text-shadow:0 0 10px ${color}44">${text}</span>`;
    }

    function setRing(color) { ring.setAttribute('stroke', color); }

    function show(formId) {
      document.querySelectorAll('form').forEach(f =>
        f.classList.toggle('active', f.id === formId));
    }

    async function post(path, body) {
      const r = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
      return data;
    }

    function enterDashboard(token, role) {
      localStorage.setItem('em_token', token);
      localStorage.setItem('em_role', role);
      location.replace('/dashboard');
    }

    // ── Setup form ──
    document.getElementById('form-setup').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('su-btn');
      btn.disabled = true;
      setLcd('Creating account…', AMBER);
      try {
        const d = await post('/api/setup', {
          token:    document.getElementById('su-token').value.trim(),
          username: document.getElementById('su-user').value.trim(),
          password: document.getElementById('su-pass').value,
        });
        setLcd('Account created', GREEN);
        setRing(GREEN);
        enterDashboard(d.token, d.role);
      } catch (err) {
        setLcd(err.message, RED);
        btn.disabled = false;
      }
    });

    // ── Login form ──
    document.getElementById('form-login').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('li-btn');
      btn.disabled = true;
      setLcd('Signing in…', GREEN);
      try {
        const d = await post('/api/auth/login', {
          username: document.getElementById('li-user').value.trim(),
          password: document.getElementById('li-pass').value,
        });
        enterDashboard(d.token, d.role);
      } catch (err) {
        setLcd(err.message, RED);
        btn.disabled = false;
      }
    });

    // ── Landing state machine ──
    // 1. Valid stored session → straight to /dashboard.
    // 2. Setup pending → amber ring + create-admin form.
    // 3. Configured → green ring + login form.
    async function init() {
      const token = localStorage.getItem('em_token');
      if (token) {
        try {
          const r = await fetch('/api/auth/me',
            { headers: { Authorization: `Bearer ${token}` } });
          if (r.ok) { location.replace('/dashboard'); return; }
        } catch {}
        localStorage.removeItem('em_token');
        localStorage.removeItem('em_role');
      }

      try {
        const r = await fetch('/api/system/setup-state');
        const d = await r.json();
        if (d.needs_setup) {
          setRing(AMBER);
          setLcd('First-run setup', AMBER);
          hint.innerHTML = 'The setup token is in the controller logs:<br/>' +
                           '<code>docker logs echomuse-controller</code>';
          show('form-setup');
          document.getElementById('su-token').focus();
        } else {
          setRing(GREEN);
          setLcd('Ready — sign in', GREEN);
          hint.textContent = '';
          show('form-login');
          document.getElementById('li-user').focus();
        }
      } catch (e) {
        setRing(DIM);
        setLcd('API unreachable', AMBER);
        hint.textContent = String(e);
      }
    }

    init();
  </script>
</body>
</html>
