# openWakeWord training config — generated by forge.py, one per wake word.
# Field semantics follow openWakeWord examples/custom_model.yml (pinned SHA in Dockerfile).
# You can edit this file after `forge.py new` and before `forge.py build`.

model_name: "@NAME@"

# Phrase(s) the model activates on. Multiple entries still train ONE binary
# model that fires on any of them.
target_phrase:
  - "@PHRASE@"

# Phrases the model must NOT activate on (beyond the automatic phoneme-overlap
# adversarial negatives). Add problem words you observe in practice.
custom_negative_phrases: []

# Synthetic positives: 20k minimum recommended, 100k+ is best.
n_samples: @N_SAMPLES@
n_samples_val: @N_SAMPLES_VAL@

tts_batch_size: 50
augmentation_batch_size: 16
augmentation_rounds: 1

piper_sample_generator_path: "/opt/piper-sample-generator"

# train.py writes clips to <output_dir>/<model_name>/{positive,negative}_{train,test}
# and the final model to <output_dir>/<model_name>.onnx
output_dir: "@OUTPUT_DIR@"

rir_paths:
  - "/data/assets/mit_rirs"

background_paths:
  - "/data/assets/audioset_16k"
  - "/data/assets/fma_16k"
background_paths_duplication_rate:
  - 1
  - 1

false_positive_validation_data_path: "/data/assets/features/validation_set_features.npy"

feature_data_files:
  "ACAV100M_sample": "/data/assets/features/openwakeword_features_ACAV100M_2000_hrs_16bit.npy"

batch_n_per_class:
  "ACAV100M_sample": 1024
  "adversarial_negative": 50
  "positive": 50

model_type: "dnn"
layer_size: 32

steps: @STEPS@
max_negative_weight: 1500
target_false_positives_per_hour: 0.2
