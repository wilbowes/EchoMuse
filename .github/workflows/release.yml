name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true   # fetches GoTinyAlsa submodule

      - name: Build compiler image
        run: docker build -t echomuse-compiler device/compiler/

      - name: Compile
        run: |
          mkdir -p device/build
          docker run --rm \
            --entrypoint bash \
            -e CGO_LDFLAGS="-Wl,--hash-style=both" \
            -v "${{ github.workspace }}/device":/sdk \
            -v "${{ github.workspace }}/GoTinyAlsa":/GoTinyAlsa \
            echomuse-compiler \
            -c "cd /sdk && mkdir -p build && go build \
              -tags server \
              -ldflags \"-X github.com/wilbowes/EchoMuse/internal/client.Version=${{ github.ref_name }}\" \
              -o build/server \
              ./cmd/"

      - name: Verify binary
        run: |
          file device/build/server
          ls -lh device/build/server
          strings device/build/server | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: EchoMuse ${{ github.ref_name }}
          files: device/build/server
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
